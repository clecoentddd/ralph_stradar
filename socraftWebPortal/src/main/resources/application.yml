# DataSource Configuration
spring:

  jpa:
    show-sql: false
    hibernate:
      ddl-auto: update

  datasource:
    url: jdbc:postgresql://localhost:5432/postgres-so
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  # Flyway Configuration
  flyway:
    url: jdbc:postgresql://localhost:5432/postgres
    locations: classpath:db/migration
    user: postgres
    password: postgres

axon:
  serializer:
    ## xstream is not compatible anymore with jdk17+
    general: jackson
  axonserver:
    enabled: false

administration:
  api:
    base-url: http://localhost:8089/api/v1
    token: Bearer mock_token_123

wiremock:
  port: 8089

#axoniq:
#  console:
#    application-name: Awesome-Microservice
#    credentials: <token> #https://console.axoniq.io/
#    dlq-mode: NONE

application:
  debug:
    enabled: true
