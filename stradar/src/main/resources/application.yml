spring:
  # DataSource Configuration
  datasource:
    url: jdbc:postgresql://localhost:5432/postgres-stradar
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  # JPA Configuration
  jpa:
    show-sql: false
    hibernate:
      ddl-auto: update

  # Flyway Configuration
  flyway:
    url: jdbc:postgresql://localhost:5432/postgres-stradar
    locations: classpath:db/migration
    user: postgres
    password: postgres
    baseline-on-migrate: true
    baseline-version: 20240101

  # Security Configuration
  security:
    oauth2:
      resourceserver:
        jwt:
          # Make sure this domain matches your NEW tenant
          issuer-uri: https://dev-ysdpxx7xb3nax6dp.us.auth0.com/

